name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-admin:
    name: Admin - Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npx tsc -b --noEmit
      - name: Build
        run: npm run build

  build-member-miniapp:
    name: Member MiniApp - Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: member-miniapp
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: member-miniapp/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npx tsc -b --noEmit
      - name: Build
        run: npm run build

  build-merchant-miniapp:
    name: Merchant MiniApp - Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: merchant-miniapp
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: merchant-miniapp/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npx tsc -b --noEmit
      - name: Build
        run: npm run build

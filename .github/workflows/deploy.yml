name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build All Apps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install Admin dependencies
        run: npm ci
        working-directory: frontend

      - name: Build Admin
        run: npm run build
        working-directory: frontend
        env:
          VITE_BASE_PATH: /hyxt/

      - name: Install Member MiniApp dependencies
        run: npm ci
        working-directory: member-miniapp

      - name: Build Member MiniApp
        run: npm run build
        working-directory: member-miniapp
        env:
          VITE_BASE_PATH: /hyxt/member/

      - name: Install Merchant MiniApp dependencies
        run: npm ci
        working-directory: merchant-miniapp

      - name: Build Merchant MiniApp
        run: npm run build
        working-directory: merchant-miniapp
        env:
          VITE_BASE_PATH: /hyxt/merchant/

      - name: Prepare deploy directory
        run: |
          mkdir -p deploy/admin deploy/member deploy/merchant
          cp -r frontend/dist/* deploy/admin/
          cp -r member-miniapp/dist/* deploy/member/
          cp -r merchant-miniapp/dist/* deploy/merchant/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: deploy

  deploy:
    name: Deploy
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
